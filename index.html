<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D World Gift for Ayu Anita</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            user-select: none;
        }

        /* --- 1. LAYER HITUNG MUNDUR / INTRO TEXT --- */
        .overlay-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 16, 0.9);
            cursor: pointer;
        }

        #countdownText {
            font-size: 5rem;
            font-weight: bold;
            color: #ff4fa8;
            text-shadow: 0 0 20px #ff4fa8, 0 0 40px #ff4fa8;
            transition: all 0.3s ease;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* --- 2. HAPPY BIRTHDAY SAYANG--- */
        #title-overlay {
            position: absolute;
            top: 8%;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255, 79, 168, 0.8);
            z-index: 10;
            opacity: 0;
            transition: opacity 1s ease;
        }

        #instruction {
            position: absolute;
            bottom: 5%;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 1s ease;
        }

        /* --- 3. TOMBOL UTAMA --- */
        #action-btn {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ff4fa8, #ff758c);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 79, 168, 0.6);
            z-index: 20;
            opacity: 0;
            transition: opacity 1s ease, transform 0.2s;
            display: none;
        }

        #action-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div class="overlay-screen" id="overlayScreen">
        <div id="countdownText">KLIK LAYAR KADO UTK MEMULAI ✨</div>
    </div>

    <div id="title-overlay">Only For U, Najwa Khailifa ❤️</div>
    <button id="action-btn" onclick="transformToHeart()">Klik Tombol Ini ❤️</button>
    <div id="instruction">Geser untuk memutar dunia 3D | Cubit/Scroll untuk Zoom</div>

    <audio id="backsound" src="RPReplay_Final1780276651.mp4" loop></audio>

    <script>
        // --- 1. SETUP PEMANDANGAN INTERAKTIF ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 2. MEMBUAT BINGKAI FOTO 3D DI TENGAH PLANET ---
        // Kamu bisa mengganti 'foto_pacar.jpg' dengan nama file foto pacarmu
        const textureLoader = new THREE.TextureLoader();
        const photoTexture = textureLoader.load('foto_pacar.jpg');
        
        // Ukuran bingkai foto (Lebar: 10, Tinggi: 13)
        const photoGeometry = new THREE.PlaneGeometry(10, 13);
        const photoMaterial = new THREE.MeshBasicMaterial({ 
            map: photoTexture, 
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0 // Awalnya disembunyikan, muncul saat jadi hati
        });
        const photoMesh = new THREE.Mesh(photoGeometry, photoMaterial);
        scene.add(photoMesh);

        // --- 3. MEMBUAT PARTIKEL BOLA UTAMA (MERAH NEON) ---
        const sphereRadius = 12;
        const sphereParticleCount = 4500;
        const sphereGeometry = new THREE.BufferGeometry();
        
        const currentPositions = new Float32Array(sphereParticleCount * 3);
        const initialPositions = new Float32Array(sphereParticleCount * 3);
        const heartPositions = new Float32Array(sphereParticleCount * 3);
        const sphereColors = new Float32Array(sphereParticleCount * 3);

        function getHeartPoint3D(u, v, scale) {
            const x = 16 * Math.pow(Math.sin(u), 3) * Math.sin(v);
            const y = 13 * Math.cos(u) - 5 * Math.cos(2*u) - 2 * Math.cos(3*u) - Math.cos(4*u);
            const z = 16 * Math.pow(Math.sin(u), 3) * Math.cos(v);
            return {
                x: x * (scale * 0.06),
                y: y * (scale * 0.06),
                z: z * (scale * 0.06)
            };
        }

        for (let i = 0; i < sphereParticleCount; i++) {
            const uSphere = Math.random();
            const vSphere = Math.random();
            const theta = uSphere * 2.0 * Math.PI;
            const phi = Math.acos(2.0 * vSphere - 1.0);
            const r = sphereRadius + (Math.random() - 0.5) * 1.2; 

            const xS = r * Math.sin(phi) * Math.cos(theta);
            const yS = r * Math.sin(phi) * Math.sin(theta);
            const zS = r * Math.cos(phi);

            initialPositions[i * 3] = xS;
            initialPositions[i * 3 + 1] = yS;
            initialPositions[i * 3 + 2] = zS;

            currentPositions[i * 3] = xS;
            currentPositions[i * 3 + 1] = yS;
            currentPositions[i * 3 + 2] = zS;

            const uHeart = Math.random() * Math.PI;
            const vHeart = (Math.random() - 0.5) * 2 * Math.PI;
            const hPoint = getHeartPoint3D(uHeart, vHeart, 16); // Diperbesar sedikit agar muat foto di tengah

            heartPositions[i * 3] = hPoint.x + (Math.random() - 0.5) * 1.5;
            heartPositions[i * 3 + 1] = hPoint.y + (Math.random() - 0.5) * 1.5;
            heartPositions[i * 3 + 2] = hPoint.z + (Math.random() - 0.5) * 1.5;

            sphereColors[i * 3] = 1.0;                             
            sphereColors[i * 3 + 1] = 0.2 + Math.random() * 0.3;   
            sphereColors[i * 3 + 2] = 0.4 + Math.random() * 0.4;   
        }

        sphereGeometry.setAttribute('position', new THREE.BufferAttribute(currentPositions, 3));
        sphereGeometry.setAttribute('color', new THREE.BufferAttribute(sphereColors, 3));

        const pTexture = createParticleTexture();

        const sphereMaterial = new THREE.PointsMaterial({
            size: 0.5,
            vertexColors: true,
            map: pTexture,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const coreSphere = new THREE.Points(sphereGeometry, sphereMaterial);
        scene.add(coreSphere);

        // --- 4. MEMBUAT PARTIKEL CINCIN ---
        const ringParticleCount = 3000;
        const ringGeometry = new THREE.BufferGeometry();
        const ringPositions = new Float32Array(ringParticleCount * 3);

        for (let i = 0; i < ringParticleCount; i++) {
            const innerRadius = 24;
            const outerRadius = 50;
            const radius = innerRadius + Math.random() * (outerRadius - innerRadius);
            const angle = Math.random() * Math.PI * 2;

            ringPositions[i * 3] = Math.cos(angle) * radius;
            ringPositions[i * 3 + 1] = (Math.random() - 0.5) * 1.8; 
            ringPositions[i * 3 + 2] = Math.sin(angle) * radius;
        }

        ringGeometry.setAttribute('position', new THREE.BufferAttribute(ringPositions, 3));

        const ringMaterial = new THREE.PointsMaterial({
            size: 0.4,
            color: 0xffffff,
            map: pTexture,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const outerRing = new THREE.Points(ringGeometry, ringMaterial);
        outerRing.rotation.x = Math.PI * 0.18; 
        scene.add(outerRing);

        // --- 5. LOGIKA HITUNG MUNDUR ---
        const overlay = document.getElementById('overlayScreen');
        const countText = document.getElementById('countdownText');
        const audio = document.getElementById('backsound');
        
        const introSequence = ['3', '2', '1', 'HAPPY', 'BIRTHDAY', 'TO', 'AYU ANITA', '❤️'];
        let seqIndex = 0;
        let introStarted = false;

        overlay.addEventListener('click', () => {
            if (introStarted) return;
            introStarted = true;
            audio.play().catch(err => console.log("Audio diblokir:", err));
            runCountdown();
        });

        function runCountdown() {
            if (seqIndex < introSequence.length) {
                countText.style.transform = "scale(0.3)";
                countText.style.opacity = "0";
                
                setTimeout(() => {
                    countText.innerText = introSequence[seqIndex];
                    countText.style.transform = "scale(1)";
                    countText.style.opacity = "1";
                    if(introSequence[seqIndex].length > 3) {
                        countText.style.fontSize = "3.5rem";
                    } else {
                        countText.style.fontSize = "6rem";
                    }
                    seqIndex++;
                    setTimeout(runCountdown, 1000); 
                }, 100);
            } else {
                overlay.style.transition = 'opacity 0.8s ease';
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    document.getElementById('title-overlay').style.opacity = '1';
                    document.getElementById('instruction').style.opacity = '1';
                    const btn = document.getElementById('action-btn');
                    btn.style.display = 'block';
                    setTimeout(() => btn.style.opacity = '1', 50);
                }, 800);
            }
        }

        // --- 6. ANIMASI MELEDAK JADI BENTUK HATI + FOTO MUNCUL ---
        let isHeartForm = false;
        let transitionProgress = 0;

        function transformToHeart() {
            isHeartForm = !isHeartForm;
            const btn = document.getElementById('action-btn');
            if(isHeartForm) {
                btn.innerText = "Kembalikan Planet 🌍";
                targetRotationY += Math.PI * 2;
            } else {
                btn.innerText = "Klik Tombol Ini ❤️";
            }
        }

        // --- 7. INTERAKSI MOUSE & SENTUHAN ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let targetRotationX = 0;
        let targetRotationY = 0;

        window.addEventListener('mousedown', () => { isDragging = true; });
        window.addEventListener('touchstart', (e) => { 
            isDragging = true; 
            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaMove = { x: e.clientX - previousMousePosition.x, y: e.clientY - previousMousePosition.y };
                targetRotationY += deltaMove.x * 0.005;
                targetRotationX += deltaMove.y * 0.005;
            }
            previousMousePosition = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const deltaMove = { x: e.touches[0].clientX - previousMousePosition.x, y: e.touches[0].clientY - previousMousePosition.y };
                targetRotationY += deltaMove.x * 0.008;
                targetRotationX += deltaMove.y * 0.008;
            }
            previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('mouseup', () => { isDragging = false; });
        window.addEventListener('touchend', () => { isDragging = false; });

        window.addEventListener('wheel', (e) => {
            camera.position.z += e.deltaY * 0.05;
            camera.position.z = Math.max(25, Math.min(camera.position.z, 120));
        });

        function createParticleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 16;
            canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(8, 8, 0, 8, 8, 8);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 16, 16);
            return new THREE.CanvasTexture(canvas);
        }

        // --- 8. ANIMASI LOOP UTAMA ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Rotasi otomatis elemen 3D
            if(!isHeartForm) {
                coreSphere.rotation.y = elapsedTime * 0.1;
                photoMesh.rotation.y = elapsedTime * 0.1; // Foto ikut berputar pelan bersama planet
            } else {
                coreSphere.rotation.y = elapsedTime * 0.2;
                photoMesh.rotation.y = elapsedTime * 0.2;
            }
            outerRing.rotation.z = -elapsedTime * 0.04;

            // Transisi posisi partikel (Bola <-> Hati)
            const positions = sphereGeometry.attributes.position.array;
            
            if (isHeartForm && transitionProgress < 1) {
                transitionProgress += 0.03; 
            } else if (!isHeartForm && transitionProgress > 0) {
                transitionProgress -= 0.03; 
            }

            const p = Math.min(Math.max(transitionProgress, 0), 1);
            const ease = p * p * (3 - 2 * p); 

            for (let i = 0; i < sphereParticleCount * 3; i++) {
                positions[i] = initialPositions[i] + (heartPositions[i] - initialPositions[i]) * ease;
            }
            sphereGeometry.attributes.position.needsUpdate = true;

            // Mengatur Transparansi Munculnya Foto (Fade In saat jadi Hati, Fade Out saat jadi Bola)
            photoMaterial.opacity = ease;

            // Menggabungkan interaksi rotasi pengguna
            scene.rotation.y += (targetRotationY - scene.rotation.y) * 0.05;
            scene.rotation.x += (targetRotationX - scene.rotation.x) * 0.05;

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
